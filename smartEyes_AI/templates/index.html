<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEyes - Cyber Monitor</title>
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-blue: #00e5ff;
            --glass-bg: rgba(16, 20, 24, 0.7);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-blue);
        }
        .device-badge {
            display: inline-block;
            background: rgba(0, 229, 255, 0.15);
            border: 1px solid var(--neon-blue);
            border-radius: 20px;
            padding: 4px 16px;
            font-size: 13px;
            color: var(--neon-blue);
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
            max-width: 500px;
            width: 100%;
        }
        #videoContainer {
            position: relative;
            display: inline-block;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.4);
            margin-bottom: 15px;
        }
        #videoElement {
            width: 100%;
            display: block;
        }
        #videoOverlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(0, 255, 157, 0.1) 1px, transparent 1px);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }
        #alertBox {
            font-size: 20px;
            font-weight: bold;
            color: #ff2a6d;
            margin-top: 10px;
            min-height: 30px;
            text-shadow: 0 0 8px #ff2a6d;
            letter-spacing: 1px;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2) inset;
            margin-bottom: 20px;
        }
        button:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
        }
    </style>
</head>
<body>

    <h2>SmartEyes UI</h2>
    <div class="device-badge" id="deviceBadge">THIET BI ...</div>
    <button id="startBtn">Kich hoat Camera</button>

    <div class="glass-panel">
        <div id="videoContainer">
            <video id="videoElement" autoplay playsinline></video>
            <div id="videoOverlay"></div>
        </div>
        <div id="alertBox">Dang cho tin hieu...</div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    <audio id="alertAudio"></audio>

    <script>
        let deviceId = null;

        async function initDevice() {
            // Dung lai ID cu neu da dang ky truoc do
            const saved = localStorage.getItem('smarteyes_device_id');
            if (saved) {
                deviceId = saved;
            } else {
                const res = await fetch('/register', { method: 'POST' });
                const data = await res.json();
                deviceId = data.device_id;
                localStorage.setItem('smarteyes_device_id', deviceId);
            }
            document.getElementById('deviceBadge').textContent = 'THIET BI ' + deviceId;
            document.title = 'SmartEyes - Thiet bi ' + deviceId;
        }

        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const alertBox = document.getElementById('alertBox');
        const alertAudio = document.getElementById('alertAudio');

        let lastTimestamp = 0;
        let isProcessing = false;

        initDevice();

        document.getElementById('startBtn').addEventListener('click', async function() {
            this.style.display = 'none';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alertBox.innerText = "Loi mo camera: " + err.message;
                return;
            }

            alertAudio.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";
            alertAudio.play().catch(() => {});

            setInterval(sendFrameToServer, 50);
        });

        async function sendFrameToServer() {
            if (isProcessing || !video.videoWidth) return;
            isProcessing = true;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = canvas.toDataURL('image/jpeg', 0.6);

            try {
                const response = await fetch('/process_frame', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData, device_id: deviceId })
                });

                const data = await response.json();

                if (data.timestamp > lastTimestamp && data.label !== "") {
                    lastTimestamp = data.timestamp;
                    alertBox.innerText = "⚠️ " + data.message;

                    alertAudio.src = `/audio/${data.label}?t=${data.timestamp}`;
                    alertAudio.play().catch(e => console.error("Loi loa:", e));
                }
            } catch (err) {
                console.error("Loi mang:", err);
            } finally {
                isProcessing = false;
            }
        }
    </script>
</body>
</html>

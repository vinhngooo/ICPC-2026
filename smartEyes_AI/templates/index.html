<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEyes - Camera Web</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 10px;
        }
        #videoElement {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            border: 2px solid #4CAF50;

        }
        #alertBox {
            font-size: 22px;
            font-weight: bold;
            color: #ff5252;
            margin-top: 15px;
            min-height: 30px;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h2>SmartEyes</h2>
    <button id="startBtn">Mở Camera & Cảnh báo</button>

    <div>
        <video id="videoElement" autoplay playsinline></video>
    </div>

    <div id="alertBox">Đang chờ tín hiệu...</div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const alertBox = document.getElementById('alertBox');

        let lastTimestamp = 0;
        let isProcessing = false;

        document.getElementById('startBtn').addEventListener('click', async function() {
            this.style.display = 'none';

            // 1. Xin quyền mở camera trước
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Lỗi mở camera: " + err.message);
                return;
            }

            // Phát âm thanh im lặng để cấp quyền autoplay
            let silentAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA");
            silentAudio.play().catch(() => {});

            // 2. Chụp ảnh liên tục gửi lên server
            setInterval(sendFrameToServer, 10); 
        });

        async function sendFrameToServer() {
            if (isProcessing || !video.videoWidth) return;
            isProcessing = true;

            // Đặt kích thước canvas bằng video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Nén ảnh thành base64 (chất lượng 0.6 để gửi cho nhanh)
            const imageData = canvas.toDataURL('image/jpeg', 0.6);

            try {
                const response = await fetch('/process_frame', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();

                // Nhận và phát cảnh báo
                if (data.timestamp > lastTimestamp && data.label !== "") {
                    lastTimestamp = data.timestamp;
                    alertBox.innerText = data.message;

                    const audio = new Audio(`/audio/${data.label}`);
                    audio.play().catch(e => console.error("Lỗi loa:", e));
                }
            } catch (err) {
                console.error("Lỗi gửi ảnh:", err);
            } finally {
                isProcessing = false;
            }
        }
    </script>
</body>
</html>

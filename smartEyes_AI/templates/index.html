<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Blind Assist Link</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        #status {
            font-size: 1.5rem;
            margin-top: 20px;
            color: #00ffcc;
        }
        video {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            border: 2px solid #333;
        }
    </style>
</head>
<body>

    <h2>AI Real-Time Navigation Unit</h2>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <div id="status">Connecting to Brain...</div>

    <script>
        const socket = io();
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');

        let lastSpokenText = "";
        let isSpeaking = false;

        // Establish connection status
        socket.on('connect', () => {
            statusDiv.innerText = "System Engaged. Streaming Camera...";
            startStreaming();
        });

        // Initialize user device back-facing camera stream
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: 640, height: 480 },
            audio: false
        })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            statusDiv.innerText = "Camera access denied or unavailable.";
            console.error(err);
        });

        function startStreaming() {
            // Set canvas rendering dimensions match
            canvas.width = 320;
            canvas.height = 240;

            // Stream loops a frame every 150ms to maintain real-time tracking without choking network bandwidth
            setInterval(() => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // Compress to 60% quality JPEG
                    socket.emit('video_frame', dataUrl);
                }
            }, 150);
        }

        // Catch directional/obstacle audio payloads from server
        socket.on('navigation_instruction', (data) => {
            const message = data.message;
            statusDiv.innerText = "Instruction: " + message;

            // Voice Engine Execution: Prevent repetitive loops and overlaps
            if (message !== "Clear" && message !== lastSpokenText && !window.speechSynthesis.speaking) {
                lastSpokenText = message;
                const utterance = new SpeechSynthesisUtterance(message);
                utterance.rate = 1.2; // Speed up speech slightly for snappier real-time response
                window.speechSynthesis.speak(utterance);
            } else if (message === "Clear") {
                lastSpokenText = ""; // Reset history if way is completely clear
            }
        });
    </script>
</body>
</html>

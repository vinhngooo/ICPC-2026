<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEyes AI</title>
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-blue: #00e5ff;
            --neon-red: #ff2a6d;
            --bg: #0a0a14;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }
        header {
            text-align: center;
            padding: 14px 0 18px;
            letter-spacing: 4px;
            font-size: 17px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            text-transform: uppercase;
            width: 100%;
        }
        .device-badge {
            display: inline-block;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-radius: 20px;
            padding: 4px 18px;
            font-size: 12px;
            color: var(--neon-blue);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .card {
            background: rgba(16, 20, 30, 0.85);
            border: 1px solid rgba(0, 229, 255, 0.25);
            border-radius: 14px;
            padding: 14px;
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.07);
        }
        .card-title {
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--neon-blue);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
            transition: background 0.4s;
        }
        .status-dot.active {
            background: var(--neon-green);
            box-shadow: 0 0 6px var(--neon-green);
        }
        .cam-wrap {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 157, 0.3);
            background: #000;
        }
        #videoElement {
            width: 100%;
            display: block;
        }
        .scanline {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0, 255, 157, 0.03) 3px,
                rgba(0, 255, 157, 0.03) 4px
            );
            pointer-events: none;
        }
        .alert-box {
            font-size: 16px;
            font-weight: bold;
            color: var(--neon-red);
            text-shadow: 0 0 8px var(--neon-red);
            min-height: 44px;
            line-height: 1.5;
        }
        .alert-box.idle {
            color: #555;
            text-shadow: none;
            font-weight: normal;
            font-size: 14px;
        }
        .start-btn {
            width: 100%;
            max-width: 520px;
            padding: 13px;
            font-size: 15px;
            font-weight: bold;
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 12px rgba(0, 255, 157, 0.15) inset;
            margin-bottom: 4px;
        }
        .start-btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 24px var(--neon-green);
        }
        .time-label {
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
        }
        footer {
            margin-top: 24px;
            color: #333;
            font-size: 11px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <header>SmartEyes AI</header>
    <div class="device-badge" id="deviceBadge">Thiet bi ...</div>

    <button class="start-btn" id="startBtn">Kich Hoat Camera</button>

    <div class="card">
        <div class="card-title">
            <span class="status-dot" id="statusDot"></span>
            Camera
        </div>
        <div class="cam-wrap">
            <video id="videoElement" autoplay playsinline></video>
            <div class="scanline"></div>
        </div>
        <div class="alert-box idle" id="alertBox">Dang cho tin hieu...</div>
        <div class="time-label" id="timeLabel">--:--:--</div>
    </div>

    <footer>SmartEyes &bull; Auto-detect</footer>

    <canvas id="canvas" style="display:none;"></canvas>
    <audio id="alertAudio"></audio>

    <script>
        let deviceId = null;

        async function initDevice() {
            const saved = localStorage.getItem('smarteyes_device_id');
            if (saved) {
                deviceId = saved;
            } else {
                const res = await fetch('/register', { method: 'POST' });
                const data = await res.json();
                deviceId = data.device_id;
                localStorage.setItem('smarteyes_device_id', deviceId);
            }
            document.getElementById('deviceBadge').textContent = 'Thiet bi ' + deviceId;
            document.title = 'SmartEyes - Thiet bi ' + deviceId;
        }

        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const alertBox = document.getElementById('alertBox');
        const alertAudio = document.getElementById('alertAudio');
        const statusDot = document.getElementById('statusDot');
        const timeLabel = document.getElementById('timeLabel');

        let lastTimestamp = 0;
        let isProcessing = false;
        let isAudioPlaying = false;
        let pendingAudio = null;
        let audioTimeout = null;
        let idleTimer = null;

        function onAudioDone() {
            isAudioPlaying = false;
            clearTimeout(audioTimeout);
            if (pendingAudio) {
                const { src, message } = pendingAudio;
                pendingAudio = null;
                playAlert(src, message);
            }
        }

        alertAudio.addEventListener('ended', onAudioDone);
        alertAudio.addEventListener('error', onAudioDone);

        function playAlert(src, message) {
            isAudioPlaying = true;
            alertBox.innerText = "⚠️ " + message;
            alertBox.classList.remove('idle');
            const d = new Date();
            timeLabel.textContent = d.toLocaleTimeString('vi-VN');

            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                alertBox.textContent = 'Dang quan sat...';
                alertBox.classList.add('idle');
            }, 6000);

            alertAudio.src = src;
            alertAudio.play().catch(e => {
                console.error("Loi loa:", e);
                onAudioDone();
            });
            clearTimeout(audioTimeout);
            audioTimeout = setTimeout(onAudioDone, 10000);
        }

        initDevice();

        document.getElementById('startBtn').addEventListener('click', async function() {
            this.style.display = 'none';
            statusDot.classList.add('active');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alertBox.innerText = "Loi mo camera: " + err.message;
                alertBox.classList.remove('idle');
                return;
            }

            alertAudio.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";
            alertAudio.play().catch(() => {});

            setInterval(sendFrameToServer, 100);
        });

        async function sendFrameToServer() {
            if (isProcessing || !video.videoWidth) return;
            isProcessing = true;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = canvas.toDataURL('image/jpeg', 0.6);

            try {
                const response = await fetch('/process_frame', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData, device_id: deviceId })
                });

                const data = await response.json();

                if (data.timestamp > lastTimestamp && data.label !== "") {
                    lastTimestamp = data.timestamp;
                    const src = `/audio/${data.label}?t=${data.timestamp}`;
                    if (!isAudioPlaying) {
                        playAlert(src, data.message);
                    } else {
                        pendingAudio = { src, message: data.message };
                    }
                }
            } catch (err) {
                console.error("Loi mang:", err);
            } finally {
                isProcessing = false;
            }
        }
    </script>
</body>
</html>
